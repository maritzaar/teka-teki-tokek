<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teka-Teki Silang</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sheet">

  <header>
    <div>
      <div class="masthead">Teka-Teki <span class="no">Silang</span></div>
      <div class="edition">Edisi Pengetahuan Umum &middot; 10 &times; 10</div>
    </div>
    <div class="edition" id="progress">0 / 0 kotak terisi</div>
    <div class="edition" id="scoreDisplay">Skor: 100</div>
  </header>

  <div class="layout">
    <div>
      <div class="board-wrap">
        <div id="grid"></div>
      </div>
      <div class="controls">
        <button id="checkBtn">Periksa Jawaban</button>
        <button class="secondary" id="hintBtn">Buka 1 Huruf</button>
        <button class="secondary" id="resetBtn">Ulangi</button>
      </div>
      <div id="status"></div>
    </div>

    <div class="clues">
      <div class="clue-group">
        <h2>Mendatar</h2>
        <ul class="clue-list" id="acrossList"></ul>
      </div>
      <div class="clue-group">
        <h2>Menurun</h2>
        <ul class="clue-list" id="downList"></ul>
      </div>
    </div>
  </div>

  <footer>Klik nomor petunjuk untuk lompat ke kotak &middot; Dibuat untuk dimainkan bareng teman</footer>
</div>

<script src="script.js"></script>
</body>
</html>
